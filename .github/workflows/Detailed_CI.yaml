name: CI Pipeline

# ==========================
# LEGEND (for learners):
# ==========================
# 🟦 Job: represents a stage in the pipeline (e.g., checkout, test, security)
# 🟩 Step: numbered actions within each job (e.g., install dependencies, run tests)
# 🟨 Optional Step: steps that are not mandatory but show typical DevOps practices (build, Docker)
# ==========================

on:
  workflow_dispatch:

jobs:

  # ==========================
  # Job 1: Checkout
  # ==========================

  job1_checkout:
    name: Checkout Source 🟦
    runs-on: ubuntu-latest

    steps:
      # Step 1.1: Checkout code

      - name: 1.1 Checkout code 🟩
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        # Explanation: Pulls the latest code from GitHub so the pipeline can access it

  # =====================================
  # Job 2: Setup Environment & Run test
  # =====================================

  job2_Test:
    name: Run test 🟦
    runs-on: ubuntu-latest
    needs: job1_checkout


    steps:
      # Step 2.1: Checkout code

      - name: 2.1 Checkout code 🟩
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Step 2.2: Setup Node.js
      - name: Setup Node.js 🟩
        uses: actions/setup-node@v6
        with:
          node-version: 24
        # Explanation: Installs Node.js runtime to run npm commands


      # Step 2.3: Install dependencies
      - name: Install dependencies 🟩
        run: npm install    # Explanation: Installs project packages required for code execution and tests

      # Step 2.3: Run unit tests with Jest
      - name: Run unit tests (Jest) 🟩
        run: npm test -- --coverage
        # Explanation: Executes automated tests and generates coverage reports

  # ==========================
  # Job 3: Security Scan
  # ==========================
  job3_security:
    name:  Security & Secret Scans 🟦
    runs-on: ubuntu-latest
    needs: job2_Test

    steps:
      # Step 3.1: Checkout code again
      - name:  Checkout code 🟩
        uses: actions/checkout@v6

      # Step 3.2: Gitleaks scan
      - name: Gitleaks scan 🟩
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Explanation: Detects secrets in git history (passwords, API keys, etc.)

      # Step 3.3: Trivy Filesystem Scan
      - name:  Trivy FS Scan 🟩
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
        # Explanation: Scans files and packages for known vulnerabilities (CVEs)

  # ==========================
  # Job 4: Code Quality
  # ==========================
  job4_code_quality:
    name:  Static Code Analysis 🟦
    runs-on: ubuntu-latest
    needs: job3_security
    steps:
      # Step 4.1: Checkout code
      - name: Checkout code 🟩
        uses: actions/checkout@v6

      # Step 4.2: SonarCloud Scan
      - name:  SonarCloud Scan 🟩
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=purity-chepkemoi
            -Dsonar.organization=purity-chepkemoi
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Explanation: Performs code quality analysis, coverage check, and detects code smells

  # ==========================
  # Job 5 Build / Package
  # ==========================
  job5_build:
    name: Build / Package 🟦
    runs-on: ubuntu-latest
    needs: 
      - job4_code_quality
  

    steps:
      # Step 5.1: Checkout code
      - name:  Checkout code 🟩
        uses: actions/checkout@v6

      # Step 5.2: Node.js build (optional)
      - name:  Node.js build 🟨
        run: |
          echo "This is where your app would be transpiled, bundled, or packaged"
          # Example: npm run build
        # Explanation: Prepares an artifact for deployment if needed

      # Step 5.3: Docker build (optional)
      - name:  Docker build 🟨
        run: |
          echo "This is where you would build a Docker image for deployment"
          # Example: docker build -t my-js-app .
        # Explanation: Packages your app and environment into a portable container
